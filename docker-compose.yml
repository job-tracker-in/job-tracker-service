services:

  postgres:
    image: postgres:15-alpine
    container_name: prod_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: keycloak,jobtracker
      POSTGRES_INITDB_ARGS: "-E UTF8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh

    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=256MB

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    mem_limit: 350m
    cpus: "0.30"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: prod_keycloak

    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      KC_HOSTNAME: auth.job-tracker.in
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      JAVA_OPTS_KC_HEAP: >
        -Xms256m
        -Xmx384m
        -XX:MetaspaceSize=96m
        -XX:MaxMetaspaceSize=192m

      KC_DB_POOL_INITIAL_SIZE: "2"
      KC_DB_POOL_MIN_SIZE: "2"
      KC_DB_POOL_MAX_SIZE: "5"

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_LOG_LEVEL: "WARN"

    command: start

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "127.0.0.1:8080:8080"

    mem_limit: 650m
    cpus: "0.40"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  api:
    image: krkzero9/jobtracker-api:latest
    container_name: prod_api

    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobtracker
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD}

      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "5"

      KEYCLOAK_ISSUER_URI: https://auth.job-tracker.in/realms/jobtracker

      LOG_LEVEL: "INFO"
      SERVER_PORT: "8080"
      SHUTDOWN_TIMEOUT: "30s"
      ACTUATOR_ENDPOINTS: "health,info"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

    ports:
      - "127.0.0.1:8081:8080"

    mem_limit: 450m
    cpus: "0.30"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: prod_nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - keycloak
      - api

    mem_limit: 64m
    cpus: "0.10"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge