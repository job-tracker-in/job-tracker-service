services:

  postgres:
    image: postgres:15-alpine
    container_name: prod_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobtracker
      POSTGRES_INITDB_ARGS: "-E UTF8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh

    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=256MB

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    mem_limit: 350m
    cpus: "0.30"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  api:
    image: krkzero9/job-tracker-api:latest
    container_name: prod_api

    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/jobtracker
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD}

      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "5"

      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_ISSUER_URI: ${SUPABASE_ISSUER_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      LOG_LEVEL: "INFO"
      SERVER_PORT: "8080"
      SHUTDOWN_TIMEOUT: "30s"
      ACTUATOR_ENDPOINTS: "health,info,prometheus"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "127.0.0.1:8081:8080"

    mem_limit: 450m
    cpus: "0.30"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: prod_nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - api

    mem_limit: 64m
    cpus: "0.10"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    container_name: prod_redis
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    cpus: "0.10"
    restart: always
    networks:
      - app_network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:latest
    container_name: prod_prometheus

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    ports:
      - "127.0.0.1:9090:9090"

    depends_on:
      - api

    mem_limit: 150m
    cpus: "0.15"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:latest
    container_name: prod_grafana

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://api.job-tracker.in/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

    ports:
      - "127.0.0.1:3001:3000"

    depends_on:
      - prometheus

    mem_limit: 320m
    cpus: "0.15"

    restart: always
    networks:
      - app_network

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  app_network:
    driver: bridge