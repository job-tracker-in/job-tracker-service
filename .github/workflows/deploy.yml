name: Job Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build application
        run: mvn clean package -DskipTests
        continue-on-error: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/job-tracker-api:latest
            ${{ secrets.DOCKER_USERNAME }}/job-tracker-api:${{ github.sha }}

      - name: Deploy on DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "Starting deployment..."
            cd /opt/job-tracker

            docker compose pull
            docker compose down
            docker compose up -d

            echo "Waiting for services to start (45 seconds for Keycloak)..."
            sleep 45

            echo "Checking container status..."
            docker compose ps

            echo "Checking logs..."
            docker compose logs job-tracker --tail=20

            echo "Testing health endpoint..."
            # Try multiple endpoints
            if curl -f http://localhost:8080/actuator/health 2>/dev/null; then
              echo "✅ Actuator health check passed!"
            elif curl -f http://localhost:8080/health 2>/dev/null; then
              echo "✅ Health endpoint passed!"
            else
              echo "⚠️  Health check failed, but continuing deployment"
              echo "Application might need more time or Keycloak might not be ready"
              docker compose logs --tail=100
            fi

            echo "Deployment complete!"