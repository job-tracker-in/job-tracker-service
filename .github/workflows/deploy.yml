name: Job Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build application
        run: mvn clean package -DskipTests
        continue-on-error: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/job-tracker-api:latest
            ${{ secrets.DOCKER_USERNAME }}/job-tracker-api:${{ github.sha }}

      - name: Deploy on DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "=========================================="
            echo "Starting deployment at $(date)"
            echo "=========================================="

            cd /opt/job-tracker

            echo "1. Pulling latest Docker images..."
            docker compose pull

            echo "2. Stopping old containers..."
            docker compose down

            echo "3. Starting new containers..."
            docker compose up -d

            echo "4. Waiting for services to initialize (30 seconds)..."
            sleep 30

            echo "5. Verifying containers are running..."
            if ! docker compose ps | grep -q "Up"; then
              echo "❌ Some containers failed to start!"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            fi

            echo "6. Health check with retry logic..."

            MAX_ATTEMPTS=5
            ATTEMPT=0

            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "   Attempt $ATTEMPT/$MAX_ATTEMPTS..."

              if curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                break
              else
                if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                  echo "   Waiting 3 seconds..."
                  sleep 3
                else
                  echo "❌ Health check failed after $MAX_ATTEMPTS attempts!"
                  docker compose logs job-tracker --tail=50
                  exit 1
                fi
              fi
            done

            echo ""
            echo "7. Final container status:"
            docker compose ps

            echo ""
            echo "=========================================="
            echo "✅ Deployment completed successfully!"
            echo "=========================================="