name: Job Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Build Spring Boot JAR
      - name: Build application
        run: mvn clean package -DskipTests

      # 4. Enable Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build & Push Docker Image
      - name: Build and Push Docker Image (AMD64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/job-tracker-api:latest

      # 7. Write SSH key (runner-safe location)
      - name: Write SSH key
        run: |
          mkdir -p "$GITHUB_HOME/.ssh"
          echo "${{ secrets.DO_SSH_KEY }}" > "$GITHUB_HOME/.ssh/deploy_key"
          chmod 600 "$GITHUB_HOME/.ssh/deploy_key"

      # 8. Deploy to DigitalOcean
      - name: Deploy on DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key_path: /github/home/.ssh/deploy_key
          script: |
            cd /opt/job-tracker
            docker compose pull
            docker compose up -d
