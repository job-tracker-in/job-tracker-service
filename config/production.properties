# APPLICATION NAME
spring.application.name=job-tracker-service

# SERVER SETTINGS
server.port=${SERVER_PORT:8080}
# ${SERVER_PORT:8080} means:
#   - Use environment variable SERVER_PORT if it exists
#   - Otherwise, use 8080 as default
# Your app will listen on this port

server.shutdown=graceful
# When stopping, finish current requests before shutting down
# Prevents losing data mid-request

spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}
# Wait max 30 seconds for requests to finish when shutting down

server.compression.enabled=true
# Compress responses to make them smaller
# Faster downloads for users

server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
# Which file types to compress

# DATABASE CONNECTION
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/jobtracker}
# DATABASE_URL format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
# jdbc:postgresql:// - tells Spring to use PostgreSQL
# localhost:5433 - where database is running
# jobtracker - name of your database

spring.datasource.username=${DATABASE_USER:jobuser}
# Username to connect to database
# Default: jobuser

spring.datasource.password=${DATABASE_PASSWORD:jobpass}
# Password to connect to database
# Default: jobpass (CHANGE IN PRODUCTION!)

spring.datasource.driver-class-name=org.postgresql.Driver
# Which database driver to use (PostgreSQL in this case)

# CONNECTION POOL SETTINGS
# Think of this like a parking lot for database connections

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
# Max 10 connections at once
# More = handles more traffic, but uses more memory

spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_SIZE:2}
# Always keep 2 connections ready
# Faster response time

spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
# Wait 20 seconds max to get a connection
# If all connections busy, wait this long before giving up

spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
# Close unused connections after 5 minutes (300,000 milliseconds)

spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
# Close connections after 30 minutes max
# Prevents stale connections

spring.datasource.hikari.pool-name=JobTrackerHikariPool
# Name for monitoring purposes

# SQL INITIALIZATION
spring.sql.init.mode=${SQL_INIT_MODE:never}
# Should we run SQL scripts on startup?
# never = don't run
# always = run scripts every time (use only first time!)

# KEYCLOAK (AUTHENTICATION)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/jobtracker}
# Where to verify authentication tokens
# Your API will check with Keycloak: "Is this token valid?"

# LOGGING
logging.level.root=${LOG_LEVEL:INFO}
# How much to log overall
# DEBUG = everything, INFO = important stuff, WARN = warnings only

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}
# Security logs (login attempts, authorization)

logging.level.org.springframework.web=${WEB_LOG_LEVEL:INFO}
# Web request logs

logging.level.org.springframework.jdbc=${JDBC_LOG_LEVEL:DEBUG}
# Database query logs

logging.level.com.zaxxer.hikari=${HIKARI_LOG_LEVEL:INFO}
# Connection pool logs

# HEALTH MONITORING
management.endpoint.health.show-details=always
# Show detailed health information
# Example: database status, disk space

management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info}
# Which monitoring endpoints to expose
# /actuator/health - is app healthy?
# /actuator/info - app information

management.health.db.enabled=true
# Include database health in health checks

# CACHING
spring.cache.type=caffeine
# Use Caffeine library for caching (in-memory cache)

spring.cache.cache-names=users
# Cache user data

spring.cache.caffeine.spec=${CACHE_SPEC:maximumSize=500,expireAfterAccess=30m}
# Cache max 500 users
# Remove from cache if not accessed for 30 minutes