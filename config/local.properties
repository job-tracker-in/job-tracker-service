spring.application.name=job-tracker-service

server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring.datasource.url=jdbc:postgresql://localhost:5433/jobtracker
spring.datasource.username=postgres
spring.datasource.password=krkPostgresKeycloak1995#
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=JobTrackerHikariPool

spring.sql.init.mode=never

spring.security.oauth2.resourceserver.jwt.issuer-uri= https://auth.job-tracker.in/realms/jobtracker

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=INFO

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info
management.health.db.enabled=true

spring.cache.type=caffeine
spring.cache.cache-names=users
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=30m
