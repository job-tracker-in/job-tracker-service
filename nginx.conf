events {
    # Event processing settings
    worker_connections 512;
    # Each worker process can handle 512 connections
}

http {
    # HTTP server settings

    include /etc/nginx/mime.types;
    # Include file type mappings
    # Tells Nginx: .html = text/html, .jpg = image/jpeg, etc.

    default_type application/octet-stream;
    # Default type if unknown: binary data

    # PERFORMANCE SETTINGS
    sendfile on;
    # Use efficient file transfer

    tcp_nopush on;
    # Send headers and file in one packet (faster)

    tcp_nodelay on;
    # Don't wait to send small packets (lower latency)

    keepalive_timeout 65;
    # Keep connections alive for 65 seconds
    # Reuse connections = faster subsequent requests

    client_max_body_size 10M;
    # Max upload size: 10MB

    # COMPRESSION
    gzip on;
    # Enable gzip compression

    gzip_vary on;
    # Add "Vary: Accept-Encoding" header

    gzip_min_length 1024;
    # Only compress if >1KB

    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    # Which file types to compress

    # UPSTREAM SERVERS
    # Define backend servers

    upstream keycloak {
        server keycloak:8080;
        # keycloak = container name (Docker DNS)
        # :8080 = port

        keepalive 4;
        # Keep 4 connections open to Keycloak
        # Faster requests
    }

    upstream api {
        server api:8080;
        keepalive 4;
    }

    # ============================================
    # SERVER 1: HTTP (Redirect to HTTPS)
    # ============================================
    server {
        listen 80;
        # Listen on port 80 (HTTP)

        server_name auth.job-tracker.in api.job-tracker.in;
        # Respond to these domains

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            # For SSL certificate renewal
            # Let's Encrypt checks this path
        }

        location / {
            return 301 https://$server_name$request_uri;
            # Redirect all HTTP → HTTPS
            # 301 = permanent redirect
            # $server_name = current domain
            # $request_uri = current path + query string
        }
    }

    # ============================================
    # SERVER 2: HTTPS for Keycloak
    # ============================================
    server {
        listen 443 ssl http2;
        # Listen on port 443 (HTTPS)
        # ssl = enable SSL
        # http2 = enable HTTP/2 (faster)

        server_name auth.job-tracker.in;
        # Only respond to auth.job-tracker.in

        # SSL CERTIFICATES
        ssl_certificate /etc/nginx/ssl/auth/fullchain.pem;
        # Full certificate chain

        ssl_certificate_key /etc/nginx/ssl/auth/privkey.pem;
        # Private key

        ssl_protocols TLSv1.2 TLSv1.3;
        # Support TLS 1.2 and 1.3 only
        # TLS 1.0 and 1.1 are insecure

        ssl_ciphers HIGH:!aNULL:!MD5;
        # Use strong ciphers only
        # !aNULL = no anonymous ciphers
        # !MD5 = no MD5 (weak)

        # SECURITY HEADERS
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Prevent clickjacking
        # Only allow framing from same domain

        add_header X-Content-Type-Options "nosniff" always;
        # Prevent MIME sniffing

        add_header X-XSS-Protection "1; mode=block" always;
        # Enable XSS protection

        add_header Strict-Transport-Security "max-age=31536000" always;
        # Force HTTPS for 1 year
        # Browser remembers: always use HTTPS

        location / {
            # All requests to auth.job-tracker.in

            proxy_pass http://keycloak;
            # Forward to keycloak upstream
            # http://keycloak = internal, not HTTPS
            # Nginx handles SSL, forwards HTTP to Keycloak

            proxy_http_version 1.1;
            # Use HTTP/1.1

            # PROXY HEADERS
            proxy_set_header Host $host;
            # Original hostname

            proxy_set_header X-Real-IP $remote_addr;
            # Client's real IP address

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Chain of proxy IPs

            proxy_set_header X-Forwarded-Proto $scheme;
            # https

            proxy_set_header X-Forwarded-Port $server_port;
            # 443

            # BUFFERING
            proxy_buffering on;
            # Buffer responses (better performance)

            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            # 8 buffers of 8KB each
        }
    }

    # ============================================
    # SERVER 3: HTTPS for API
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.job-tracker.in;

        # SSL settings (same as above)
        ssl_certificate /etc/nginx/ssl/api/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/api/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # SECURITY HEADERS
        add_header X-Frame-Options "DENY" always;
        # Never allow framing (stricter than Keycloak)

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            # All API requests

            proxy_pass http://api;
            # Forward to api upstream

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/health {
            # Special handling for health endpoint

            proxy_pass http://api;
            access_log off;
            # Don't log health checks (reduces noise)
        }
    }
}