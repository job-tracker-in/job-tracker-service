events {
    # Event processing settings
    worker_connections 512;
    # Each worker process can handle 512 connections
}

http {
    # HTTP server settings

    include /etc/nginx/mime.types;
    # Include file type mappings
    # Tells Nginx: .html = text/html, .jpg = image/jpeg, etc.

    default_type application/octet-stream;
    # Default type if unknown: binary data

    # PERFORMANCE SETTINGS
    sendfile on;
    # Use efficient file transfer

    tcp_nopush on;
    # Send headers and file in one packet (faster)

    tcp_nodelay on;
    # Don't wait to send small packets (lower latency)

    keepalive_timeout 65;
    # Keep connections alive for 65 seconds
    # Reuse connections = faster subsequent requests

    client_max_body_size 10M;
    # Max upload size: 10MB

    # COMPRESSION
    gzip on;
    # Enable gzip compression

    gzip_vary on;
    # Add "Vary: Accept-Encoding" header

    gzip_min_length 1024;
    # Only compress if >1KB

    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    # Which file types to compress

    # UPSTREAM SERVERS
    # Define backend servers

    upstream api {
        server api:8080;
        keepalive 4;
    }

    upstream grafana {
        server grafana:3000;
        keepalive 2;
    }

    # ============================================
    # SERVER 1: HTTP (Redirect to HTTPS)
    # ============================================
    server {
        listen 80;
        # Listen on port 80 (HTTP)

        server_name api.job-tracker.in;
        # Respond to these domains

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            # For SSL certificate renewal
            # Let's Encrypt checks this path
        }

        location / {
            return 301 https://$server_name$request_uri;
            # Redirect all HTTP → HTTPS
            # 301 = permanent redirect
            # $server_name = current domain
            # $request_uri = current path + query string
        }
    }

    # ============================================
    # SERVER 2: HTTPS for API
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.job-tracker.in;

        # SSL settings (same as above)
        ssl_certificate /etc/nginx/ssl/api/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/api/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # SECURITY HEADERS
        add_header X-Frame-Options "DENY" always;
        # Never allow framing (stricter than Keycloak)

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            proxy_set_header Origin "";
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/health {
            proxy_pass http://api;
            access_log off;
        }

        location /grafana/ {
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}